<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
<title>BuilderBio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111111;--s1:#1A1A1A;--s2:#222222;--s3:#2A2A2A;
  --bd:#333333;--bd2:#444444;
  --t:#f0f0f5;--t2:#b8b8c8;--tm:#6b6b80;
  --ac:#818cf8;--acd:#6366f1;--acb:rgba(99,102,241,.08);
  --g:#34d399;--gd:rgba(52,211,153,.1);
  --y:#fbbf24;--yd:rgba(251,191,36,.1);
  --b:#60a5fa;--bd3:rgba(96,165,250,.1);
  --p:#a78bfa;--pd:rgba(167,139,250,.1);
  --o:#fb923c;--od:rgba(251,146,60,.1);
  --pk:#f472b6;--r:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--t);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;max-width:100vw;padding-top:3rem}

/* NAV BAR — hardcoded colors to match site-wide Titlebar exactly */
.site-nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(26,26,26,.8);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.site-nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#333,transparent)}
.site-nav-inner{max-width:72rem;margin:0 auto;display:flex;height:3rem;align-items:center;justify-content:space-between;padding:0 1rem}
.site-nav-logo{display:flex;align-items:center;gap:.5rem;color:#999;font-weight:700;font-size:.875rem;line-height:1.25rem;letter-spacing:.025em;text-decoration:none;transition:color .2s;font-family:'JetBrains Mono','Fira Code','SF Mono',ui-monospace,monospace}
.site-nav-logo:hover{color:#FF6B35}
.site-nav-logo .tilde{color:inherit}
.site-nav-links{display:flex;align-items:center;gap:1rem;font-size:.75rem;line-height:1rem;color:#999;font-family:'JetBrains Mono','Fira Code','SF Mono',ui-monospace,monospace}
.site-nav-links a{color:inherit;text-decoration:none;transition:color .2s}
.site-nav-links a:hover{color:#FF6B35}
.site-nav-links .sep{color:#555}
.site-nav-links .active{color:#FF6B35}

/* SHARE BAR */
.share-bar{position:fixed;bottom:24px;right:24px;z-index:40;display:flex;gap:8px;align-items:center}
.share-btn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);color:var(--t2);transition:all .25s;cursor:pointer;text-decoration:none}
.share-btn:hover{border-color:var(--bd2);color:var(--t);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.share-btn svg{width:18px;height:18px;fill:currentColor}
.share-btn .share-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--s3);color:var(--t2);font-size:11px;padding:4px 10px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;border:1px solid var(--bd)}
.share-btn:hover .share-tooltip{opacity:1}
.share-btn.copied{border-color:var(--g);color:var(--g)}
.c{max-width:880px;margin:0 auto;padding:0 24px}
section{padding:60px 0}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--bd),transparent)}
.sh{margin-bottom:28px}.sh h2{font-size:22px;font-weight:700;letter-spacing:-.02em}.sh p{font-size:13px;color:var(--tm);margin-top:2px}

/* HERO */
.hero{padding:80px 0 60px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.06)0%,rgba(52,211,153,.03)40%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;font-size:12px;font-weight:600;color:var(--ac);background:var(--acb);border:1px solid rgba(99,102,241,.15);margin-bottom:24px;letter-spacing:.3px}
.unfiltered-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;color:#34d399;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);vertical-align:middle;margin-left:8px;cursor:default;position:relative;-webkit-text-fill-color:#34d399;-webkit-background-clip:unset;background-clip:unset}
.unfiltered-badge svg{width:12px;height:12px;fill:currentColor;flex-shrink:0}
.unfiltered-badge .uf-tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--s3);color:var(--t2);-webkit-text-fill-color:var(--t2);font-size:11px;font-weight:400;padding:6px 12px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;border:1px solid var(--bd)}
.unfiltered-badge:hover .uf-tip{opacity:1}
.gen-time{font-size:11px;color:var(--tm);margin-top:6px}
.hero h1{font-size:48px;font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,var(--t) 0%,var(--t2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.hero .sub{font-size:15px;color:var(--tm);margin-bottom:40px}
.stats-row{display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.stat{text-align:center}.stat .num{font-size:42px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.stat .num.ac{color:var(--ac)}.stat .num.gc{color:var(--g)}.stat .num.yc{color:var(--y)}.stat .num.bc{color:var(--b)}
.stat .lbl{font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-top:6px}
.agent-row{display:flex;justify-content:center;gap:10px;margin-top:28px;flex-wrap:wrap}
.agent-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:100px;font-size:13px;font-weight:500;background:var(--s2);color:var(--t2);border:1px solid var(--bd)}
.agent-dot{width:8px;height:8px;border-radius:50%}
.hero-avatar{width:88px;height:88px;border-radius:50%;border:3px solid var(--bd2);object-fit:cover;margin-bottom:16px;box-shadow:0 0 0 4px var(--bg),0 0 24px rgba(99,102,241,.15);display:none}
.social-row{display:flex;justify-content:center;gap:14px;margin-top:22px}
.social-link{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);color:var(--t2);transition:all .25s;text-decoration:none}
.social-link:hover{border-color:var(--bd2);color:var(--t);transform:translateY(-2px)}
.social-link svg{width:20px;height:20px;fill:currentColor}

/* PROJECTS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.pcard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:20px;transition:all .25s}
.pcard:hover{border-color:var(--bd2);transform:translateY(-2px)}
.pcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.pname{font-size:15px;font-weight:700;line-height:1.3}
.pstatus{padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.ps-shipped{background:var(--gd);color:var(--g)}.ps-progress{background:var(--yd);color:var(--y)}.ps-explored{background:var(--bd3);color:var(--b)}
.pdesc{font-size:12.5px;color:var(--t2);margin-bottom:12px;line-height:1.55}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.ptag{padding:3px 10px;border-radius:100px;font-size:10.5px;background:var(--s3);color:var(--tm);border:1px solid var(--bd);font-weight:500}
.pmeta{font-size:11.5px;color:var(--tm);display:flex;gap:12px}.pmeta strong{color:var(--t2);font-weight:600}

/* STYLE */
.style-hero{text-align:center;margin-bottom:32px;padding:28px 0}
.style-label{font-size:32px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--ac),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.style-sub{font-size:14px;color:var(--tm);margin-top:6px}
.traits{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.trait{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px;text-align:center}
.trait .tname{font-size:10.5px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:8px}
.trait .tval{font-size:20px;font-weight:800}.trait .tdesc{font-size:11px;color:var(--tm);margin-top:4px;line-height:1.4}
.tbar-wrap{margin-top:28px}.tbar-label{font-size:10.5px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:10px}
.tbar{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:2px}.tseg{height:100%;border-radius:3px;min-width:3px}
.tleg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}.tleg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tm);font-weight:500}.tleg-d{width:7px;height:7px;border-radius:2px}

/* TECH RADAR */
.radar-wrap{display:flex;justify-content:center;padding:20px 0}
.radar-bars{width:100%;max-width:600px}
.radar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.radar-label{width:140px;font-size:12px;color:var(--t2);text-align:right;font-weight:500;flex-shrink:0}
.radar-bar-bg{flex:1;height:20px;background:var(--s2);border-radius:10px;overflow:hidden}
.radar-bar{height:100%;border-radius:10px;transition:width .6s ease}
.radar-val{width:36px;font-size:11px;color:var(--tm);font-weight:600}

/* EVOLUTION CHART */
.evo-chart{position:relative;height:200px;display:flex;align-items:flex-end;gap:6px;padding:0 0 28px}
.evo-bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.evo-bar{width:100%;border-radius:6px 6px 0 0;transition:height .4s ease;position:relative;min-height:4px}
.evo-bar:hover{opacity:.85}
.evo-val{font-size:10px;color:var(--tm);font-weight:600}
.evo-label{font-size:10px;color:var(--tm);position:absolute;bottom:-24px;white-space:nowrap}
.evo-legend{display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--tm)}
.evo-legend span{display:flex;align-items:center;gap:5px}
.evo-legend-dot{width:8px;height:8px;border-radius:2px}

/* TIME DISTRIBUTION */
.time-bars{display:flex;align-items:flex-end;gap:3px;height:120px;padding:0 0 24px;position:relative}
.time-bar{flex:1;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s;position:relative}
.time-bar:hover .time-tip{opacity:1}
.time-tip{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:10px;background:var(--s3);color:var(--t2);padding:2px 6px;border-radius:4px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.time-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--tm);margin-top:4px}
.time-type{text-align:center;margin-top:20px}
.time-type .big{font-size:28px;font-weight:800;letter-spacing:-.02em}
.time-type .small{font-size:13px;color:var(--tm);margin-top:4px}
.period-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.period-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.period-card .p-name{font-size:11px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.period-card .p-val{font-size:20px;font-weight:800;margin:4px 0 2px}
.period-card .p-sub{font-size:10.5px;color:var(--tm)}

/* KEYWORDS */
.kw-cloud{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:20px 0}
.kw{padding:6px 16px;border-radius:100px;font-weight:600;border:1px solid var(--bd);transition:all .2s;cursor:default}
.kw:hover{border-color:var(--bd2);transform:scale(1.05)}

/* AGENT COMPARISON */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cmp-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:24px}
.cmp-name{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.cmp-name .dot{width:10px;height:10px;border-radius:50%}
.cmp-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmp-stat{text-align:center;padding:10px;background:var(--s2);border-radius:10px}
.cmp-stat .cv{font-size:20px;font-weight:800}.cmp-stat .cl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.cmp-tools{margin-top:14px}.cmp-tools-label{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}
.cmp-tool-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;color:var(--t2)}
.cmp-tool-bar{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}.cmp-tool-fill{height:100%;border-radius:3px}

/* HEATMAP */
.hm-scroll{overflow-x:auto;padding:4px 0}.hm-grid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px}
.hm-cell{width:13px;height:13px;border-radius:3px;background:var(--s2);transition:background .15s}
.hm-0{background:var(--s2)}.hm-1{background:rgba(52,211,153,.18)}.hm-2{background:rgba(52,211,153,.38)}.hm-3{background:rgba(52,211,153,.6)}.hm-4{background:rgba(52,211,153,.88)}
.hm-meta{display:flex;gap:24px;margin-top:14px;font-size:12.5px;color:var(--tm)}.hm-meta strong{color:var(--t2)}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:10px;font-size:11px;color:var(--tm)}.hm-legend-cell{width:13px;height:13px;border-radius:3px}

/* HIGHLIGHTS */
.hl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.hl{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:24px;position:relative;overflow:hidden}
.hl::before{content:'';position:absolute;top:0;right:0;width:100px;height:100px;border-radius:50%;filter:blur(40px);opacity:.08;pointer-events:none}
.hl:nth-child(1)::before{background:var(--ac)}.hl:nth-child(2)::before{background:var(--g)}.hl:nth-child(3)::before{background:var(--y)}.hl:nth-child(4)::before{background:var(--p)}
.hl .hl-t{font-size:10.5px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.hl .hl-v{font-size:28px;font-weight:800;margin:8px 0 4px;letter-spacing:-.02em}.hl .hl-d{font-size:12px;color:var(--tm);line-height:1.5}
.fav-prompt{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:28px;margin-top:18px;border-left:3px solid var(--ac)}
.fp-label{font-size:10.5px;color:var(--ac);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:12px}
.fp-text{font-size:14px;line-height:1.8;color:var(--t2);font-family:"SF Mono","Fira Code","JetBrains Mono",monospace;white-space:pre-wrap;word-break:break-word}

/* CTA */
.cta{text-align:center;padding:48px 32px;background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(52,211,153,.04));border:1px solid var(--bd);border-radius:18px;margin-top:8px}
.cta h3{font-size:24px;font-weight:800;margin-bottom:8px}.cta p{font-size:14px;color:var(--tm);margin-bottom:20px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6}
.cta code{display:inline-block;padding:10px 24px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;font-family:"SF Mono","Fira Code",monospace;font-size:13px;color:var(--ac);user-select:all;cursor:pointer}
.cta .cta-sub{font-size:11px;color:var(--tm);margin-top:12px}

.footer{text-align:center;padding:48px 0 40px;font-size:12px;color:var(--tm)}

/* AGENT START DATES */
.agent-since{font-size:10px;color:var(--tm);margin-top:2px;display:block;letter-spacing:.3px}

@media(max-width:640px){
  /* === MODULE-PER-SCREEN MOBILE LAYOUT ===
     Each section fills ~one screen with generous spacing.
     Optimized for easy screenshots and reduced info density. */
  section{padding:64px 0;min-height:80vh;display:flex;flex-direction:column;justify-content:center}
  .c{padding:0 24px}
  .hero-avatar{align-self:center}
  .divider{margin:16px 0}

  /* Hero — full screen intro */
  .hero{padding:48px 0 40px;min-height:90vh}
  .hero h1{font-size:32px;letter-spacing:-.03em}
  .hero .sub{font-size:14px;margin-bottom:32px;line-height:1.6}
  .stats-row{gap:28px}
  .stat .num{font-size:32px}
  .stat .lbl{font-size:10px;letter-spacing:.8px;margin-top:8px}
  .agent-row{gap:8px;margin-top:24px}
  .agent-chip{font-size:12px;padding:6px 14px}
  .agent-since{font-size:10px}

  /* Projects — one card at a time, stack vertically */
  .pgrid{grid-template-columns:1fr;gap:16px}
  .pcard{padding:20px}
  .pname{font-size:15px}
  .pdesc{font-size:13px;line-height:1.6}
  .ptags{gap:6px}
  .pmeta{font-size:12px}

  /* Style — module feel */
  .style-hero{padding:20px 0;margin-bottom:24px}
  .style-label{font-size:26px}
  .style-sub{font-size:13px;line-height:1.5}
  .traits{grid-template-columns:1fr 1fr;gap:12px}
  .trait{padding:16px}
  .trait .tval{font-size:18px}
  .trait .tname{font-size:10px}
  .trait .tdesc{font-size:11px;line-height:1.5}
  .tleg{gap:10px;margin-top:12px}
  .tleg-i{font-size:10px}
  .tbar-wrap{margin-top:24px}

  /* Tech Radar */
  .radar-label{width:80px;font-size:10px}
  .radar-bar-bg{height:18px}
  .radar-val{font-size:10px;width:32px}
  .radar-row{gap:10px;margin-bottom:10px}

  /* Evolution */
  .evo-chart{height:160px;gap:3px}
  .evo-val{font-size:9px}
  .evo-label{font-size:9px}
  .evo-insight{font-size:13px;line-height:1.5;margin-top:16px}

  /* Time — dedicated screen */
  .time-bars{height:100px;gap:2px}
  .time-type{margin-bottom:20px}
  .time-type .big{font-size:24px}
  .time-type .small{font-size:13px}
  .period-grid{grid-template-columns:1fr 1fr;gap:10px}
  .period-card{padding:14px}
  .period-card .p-val{font-size:18px}
  .period-card .p-name{font-size:10px;margin-top:4px}

  /* Keywords */
  .kw-cloud{gap:8px;padding:16px 0}
  .kw{padding:6px 14px;font-size:13px}

  /* Agent Comparison */
  .cmp-grid{grid-template-columns:1fr;gap:16px}
  .cmp-card{padding:20px}
  .cmp-name{font-size:17px}
  .cmp-stat .cv{font-size:20px}
  .cmp-stat .cl{font-size:10px}
  .cmp-insight{font-size:13px;line-height:1.5}

  /* Heatmap */
  .hm-cell{width:10px;height:10px}
  .hm-grid{gap:2px}
  .hm-meta{flex-direction:column;gap:8px;font-size:12px}

  /* Highlights — one highlight card per row */
  .hl-grid{grid-template-columns:1fr;gap:14px}
  .hl{padding:20px}
  .hl .hl-v{font-size:26px}
  .hl .hl-l{font-size:11px;margin-top:6px}
  .fav-prompt{padding:24px;margin-top:16px}
  .fp-text{font-size:13px;line-height:1.6}

  /* CTA — clear standalone screen */
  .cta{padding:40px 24px;min-height:auto}
  .cta h3{font-size:22px}
  .cta p{font-size:13px;line-height:1.5}
  .cta code,.cta-cmd span{font-size:11px!important}

  /* Section headers — breathing room */
  .sh{margin-bottom:24px}
  .sh h2{font-size:20px}
  .sh p{font-size:12px;line-height:1.5}

  /* Share bar */
  .share-bar{bottom:16px;right:16px}
  .share-btn{width:36px;height:36px;border-radius:10px}
  .share-btn svg{width:16px;height:16px}

  /* Nav — compact but readable */
  .site-nav-inner{padding:0 .75rem}
  .site-nav-logo{font-size:.75rem}
  .site-nav-links{gap:.75rem;font-size:.625rem}

  /* Footer */
  .footer{padding:40px 0 32px!important}

  /* Avatar */
  .hero-avatar{width:72px;height:72px}

  /* Social row */
  .social-row{margin-top:18px;gap:10px}
  .social-link{width:36px;height:36px;border-radius:10px}

// === EVOLUTION CHART ===
(function(){
  const evo=E.evolution;
  const maxTurns=Math.max(...evo.map(e=>e.turns));
  let h='<div style="position:relative"><div class="evo-chart">';
  evo.forEach((e,i)=>{
    const tH=Math.max(4,Math.round(e.turns/maxTurns*160));
    const label=e.week.substring(5);
    const tip=LANG==='zh'?`第${i+1}周: ${e.sessions}次会话, ${e.turns}轮对话, 平均${e.avg_turns}轮`:`Week ${i+1}: ${e.sessions} sessions, ${e.turns} turns, avg ${e.avg_turns}`;
    h+=`<div class="evo-bar-group">
      <div class="evo-val">${fN(e.turns)}</div>
      <div class="evo-bar" style="height:${tH}px;background:linear-gradient(180deg,var(--ac),var(--acd))" title="${tip}"></div>
      <div class="evo-label">${label}</div>
    </div>`;
  });
  h+='</div>';
  h+=`<div class="evo-legend"><span><span class="evo-legend-dot" style="background:var(--ac)"></span>${t('evo_legend')}</span></div>`;
  if(E.evolution_insight){
    h+='<div style="margin-top:16px;padding:16px;background:var(--s1);border:1px solid var(--bd);border-radius:12px;font-size:13px;color:var(--t2);line-height:1.6">';
    h+=`<strong style="color:var(--t)">${t('evo_trend')}</strong>${esc(E.evolution_insight)}`;
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('evolution').innerHTML=h;
})();

// === TIME DISTRIBUTION ===
(function(){
  const hd=E.time.hour_distribution;
  const maxH=Math.max(...Object.values(hd));
  const pd=E.time.period_data;
  const periodNames={'deep_night':t('period_deep_night'),'morning':t('period_morning'),'afternoon':t('period_afternoon'),'evening':t('period_evening')};
  const periodIcons={'deep_night':'🌙','morning':'☀️','afternoon':'⚡','evening':'🦉'};

  let bars='';
  for(let h=0;h<24;h++){
    const v=hd[String(h)]||0;
    const ht=maxH>0?Math.max(2,Math.round(v/maxH*100)):2;
    const col=h<6?'var(--p)':h<12?'var(--y)':h<18?'var(--o)':'var(--ac)';
    bars+=`<div class="time-bar" style="height:${ht}%;background:${col}" title="${h}:00 — ${v} ${t('time_sessions')}"><div class="time-tip">${h}:00 · ${v}</div></div>`;
  }

  let periods='';
  Object.entries(pd).forEach(([k,v])=>{
    periods+=`<div class="period-card"><div class="p-name">${periodIcons[k]} ${periodNames[k]}</div><div class="p-val">${v.sessions}</div><div class="p-sub">${fN(v.turns)} ${t('time_turns')}</div></div>`;
  });

  document.getElementById('time-dist').innerHTML=`
    <div class="time-bars">${bars}</div>
    <div class="time-labels"><span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>23:00</span></div>
    <div class="time-type"><div class="big">${esc(E.time.peak_text||'')}</div><div class="small">${esc(E.time.peak_detail||'')}</div></div>
    <div class="period-grid">${periods}</div>`;
})();

// === KEYWORDS ===
(function(){
  const kw=E.keywords;
  const maxC=Math.max(...kw.map(k=>k[1]));
  const sizes=[14,16,18,22,26,32];
  const colors=['var(--tm)','var(--t2)','var(--b)','var(--g)','var(--ac)','var(--y)'];
  document.getElementById('keywords').innerHTML='<div class="kw-cloud">'+kw.map(([w,c])=>{
    const lvl=Math.min(5,Math.floor(c/maxC*5));
    return`<span class="kw" style="font-size:${sizes[lvl]}px;color:${colors[lvl]};background:${lvl>3?'var(--s2)':'var(--s1)'}">${esc(w)}</span>`;
  }).join('')+'</div>';
})();

// === AGENT COMPARISON ===
(function(){
  const cmp=E.comparison;
  if(!cmp)return;
  const agentLabels={'claude-code':'Claude Code','codex':'Codex'};
  const agentColors={'claude-code':'var(--ac)','codex':'var(--g)'};
  let h='<div class="cmp-grid">';
  Object.entries(cmp).forEach(([agent,data])=>{
    const maxTool=Math.max(...data.top_tools.map(t=>t[1]));
    const toolBars=data.top_tools.slice(0,4).map(([tl,c])=>{
      const pct=Math.round(c/maxTool*100);
      const col=TC[tl]||'#52525b';
      return`<div class="cmp-tool-row"><span style="width:80px;flex-shrink:0">${tl}</span><div class="cmp-tool-bar"><div class="cmp-tool-fill" style="width:${pct}%;background:${col}"></div></div><span style="width:36px;text-align:right">${c}</span></div>`;
    }).join('');
    const dist=data.distribution;
    h+=`<div class="cmp-card">
      <div class="cmp-name"><span class="dot" style="background:${agentColors[agent]}"></span>${agentLabels[agent]||agent}</div>
      <div class="cmp-stats">
        <div class="cmp-stat"><div class="cv">${data.sessions}</div><div class="cl">${t('cmp_sessions')}</div></div>
        <div class="cmp-stat"><div class="cv">${fN(data.total_turns)}</div><div class="cl">${t('cmp_turns')}</div></div>
        <div class="cmp-stat"><div class="cv">${data.avg_turns}</div><div class="cl">${t('cmp_avg')}</div></div>
        <div class="cmp-stat"><div class="cv">${fN(data.total_tool_calls)}</div><div class="cl">${t('cmp_tools')}</div></div>
      </div>
      <div class="cmp-tools"><div class="cmp-tools-label">${t('cmp_top_tools')}</div>${toolBars}</div>
      <div style="margin-top:12px;font-size:12px;color:var(--tm)">${dist.short} ${t('cmp_short_session')} · ${dist.medium} ${t('cmp_medium_session')} · ${dist.long} ${t('cmp_long_session')}</div>
    </div>`;
  });
  h+='</div>';
  if(E.comparison_insight){
    h+='<div style="margin-top:16px;padding:16px;background:var(--s1);border:1px solid var(--bd);border-radius:12px;font-size:13px;color:var(--t2);line-height:1.6">';
    h+=`<strong style="color:var(--t)">${t('cmp_insight_label')}</strong>${esc(E.comparison_insight)}`;
    h+='</div>';
  }
  document.getElementById('agent-cmp').innerHTML=h;
})();
