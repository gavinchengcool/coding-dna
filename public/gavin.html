<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Builder Profile — AI 构建者画像</title>
<style>
:root {
  --bg:#050507;--s1:#0c0c10;--s2:#131318;--s3:#1a1a21;
  --bd:#1e1e28;--bd2:#2a2a38;
  --t:#f0f0f5;--t2:#b8b8c8;--tm:#6b6b80;
  --ac:#818cf8;--acd:#6366f1;--acb:rgba(99,102,241,.08);
  --g:#34d399;--gd:rgba(52,211,153,.1);
  --y:#fbbf24;--yd:rgba(251,191,36,.1);
  --b:#60a5fa;--bd3:rgba(96,165,250,.1);
  --p:#a78bfa;--pd:rgba(167,139,250,.1);
  --o:#fb923c;--od:rgba(251,146,60,.1);
  --pk:#f472b6;--r:#f87171;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--t);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.c{max-width:880px;margin:0 auto;padding:0 24px}
section{padding:60px 0}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--bd),transparent)}
.sh{margin-bottom:28px}.sh h2{font-size:22px;font-weight:700;letter-spacing:-.02em}.sh p{font-size:13px;color:var(--tm);margin-top:2px}

/* HERO */
.hero{padding:80px 0 60px;text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.06)0%,rgba(52,211,153,.03)40%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;font-size:12px;font-weight:600;color:var(--ac);background:var(--acb);border:1px solid rgba(99,102,241,.15);margin-bottom:24px;letter-spacing:.3px}
.hero h1{font-size:48px;font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,var(--t) 0%,var(--t2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.hero .sub{font-size:15px;color:var(--tm);margin-bottom:40px}
.stats-row{display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.stat{text-align:center}.stat .num{font-size:42px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.stat .num.ac{color:var(--ac)}.stat .num.gc{color:var(--g)}.stat .num.yc{color:var(--y)}.stat .num.bc{color:var(--b)}
.stat .lbl{font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-top:6px}
.agent-row{display:flex;justify-content:center;gap:10px;margin-top:28px;flex-wrap:wrap}
.agent-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;border-radius:100px;font-size:13px;font-weight:500;background:var(--s2);color:var(--t2);border:1px solid var(--bd)}
.agent-dot{width:8px;height:8px;border-radius:50%}

/* PROJECTS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.pcard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:20px;transition:all .25s}
.pcard:hover{border-color:var(--bd2);transform:translateY(-2px)}
.pcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.pname{font-size:15px;font-weight:700;line-height:1.3}
.pstatus{padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.ps-shipped{background:var(--gd);color:var(--g)}.ps-progress{background:var(--yd);color:var(--y)}.ps-explored{background:var(--bd3);color:var(--b)}
.pdesc{font-size:12.5px;color:var(--t2);margin-bottom:12px;line-height:1.55}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.ptag{padding:3px 10px;border-radius:100px;font-size:10.5px;background:var(--s3);color:var(--tm);border:1px solid var(--bd);font-weight:500}
.pmeta{font-size:11.5px;color:var(--tm);display:flex;gap:12px}.pmeta strong{color:var(--t2);font-weight:600}

/* STYLE */
.style-hero{text-align:center;margin-bottom:32px;padding:28px 0}
.style-label{font-size:32px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--ac),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.style-sub{font-size:14px;color:var(--tm);margin-top:6px}
.traits{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.trait{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px;text-align:center}
.trait .tname{font-size:10.5px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:8px}
.trait .tval{font-size:20px;font-weight:800}.trait .tdesc{font-size:11px;color:var(--tm);margin-top:4px;line-height:1.4}
.tbar-wrap{margin-top:28px}.tbar-label{font-size:10.5px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:10px}
.tbar{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:2px}.tseg{height:100%;border-radius:3px;min-width:3px}
.tleg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}.tleg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tm);font-weight:500}.tleg-d{width:7px;height:7px;border-radius:2px}

/* TECH RADAR */
.radar-wrap{display:flex;justify-content:center;padding:20px 0}
.radar-bars{width:100%;max-width:600px}
.radar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.radar-label{width:140px;font-size:12px;color:var(--t2);text-align:right;font-weight:500;flex-shrink:0}
.radar-bar-bg{flex:1;height:20px;background:var(--s2);border-radius:10px;overflow:hidden}
.radar-bar{height:100%;border-radius:10px;transition:width .6s ease}
.radar-val{width:36px;font-size:11px;color:var(--tm);font-weight:600}

/* EVOLUTION CHART */
.evo-chart{position:relative;height:200px;display:flex;align-items:flex-end;gap:6px;padding:0 0 28px}
.evo-bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.evo-bar{width:100%;border-radius:6px 6px 0 0;transition:height .4s ease;position:relative;min-height:4px}
.evo-bar:hover{opacity:.85}
.evo-val{font-size:10px;color:var(--tm);font-weight:600}
.evo-label{font-size:10px;color:var(--tm);position:absolute;bottom:-24px;white-space:nowrap}
.evo-legend{display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--tm)}
.evo-legend span{display:flex;align-items:center;gap:5px}
.evo-legend-dot{width:8px;height:8px;border-radius:2px}

/* TIME DISTRIBUTION */
.time-bars{display:flex;align-items:flex-end;gap:3px;height:120px;padding:0 0 24px;position:relative}
.time-bar{flex:1;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s;position:relative}
.time-bar:hover .time-tip{opacity:1}
.time-tip{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-size:10px;background:var(--s3);color:var(--t2);padding:2px 6px;border-radius:4px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.time-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--tm);margin-top:4px}
.time-type{text-align:center;margin-top:20px}
.time-type .big{font-size:28px;font-weight:800;letter-spacing:-.02em}
.time-type .small{font-size:13px;color:var(--tm);margin-top:4px}
.period-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.period-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.period-card .p-name{font-size:11px;color:var(--tm);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.period-card .p-val{font-size:20px;font-weight:800;margin:4px 0 2px}
.period-card .p-sub{font-size:10.5px;color:var(--tm)}

/* KEYWORDS */
.kw-cloud{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:20px 0}
.kw{padding:6px 16px;border-radius:100px;font-weight:600;border:1px solid var(--bd);transition:all .2s;cursor:default}
.kw:hover{border-color:var(--bd2);transform:scale(1.05)}

/* AGENT COMPARISON */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.cmp-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:24px}
.cmp-name{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.cmp-name .dot{width:10px;height:10px;border-radius:50%}
.cmp-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmp-stat{text-align:center;padding:10px;background:var(--s2);border-radius:10px}
.cmp-stat .cv{font-size:20px;font-weight:800}.cmp-stat .cl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.cmp-tools{margin-top:14px}.cmp-tools-label{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px}
.cmp-tool-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;color:var(--t2)}
.cmp-tool-bar{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}.cmp-tool-fill{height:100%;border-radius:3px}

/* HEATMAP */
.hm-scroll{overflow-x:auto;padding:4px 0}.hm-grid{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:3px}
.hm-cell{width:13px;height:13px;border-radius:3px;background:var(--s2);transition:background .15s}
.hm-0{background:var(--s2)}.hm-1{background:rgba(52,211,153,.18)}.hm-2{background:rgba(52,211,153,.38)}.hm-3{background:rgba(52,211,153,.6)}.hm-4{background:rgba(52,211,153,.88)}
.hm-meta{display:flex;gap:24px;margin-top:14px;font-size:12.5px;color:var(--tm)}.hm-meta strong{color:var(--t2)}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:10px;font-size:11px;color:var(--tm)}.hm-legend-cell{width:13px;height:13px;border-radius:3px}

/* HIGHLIGHTS */
.hl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.hl{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:24px;position:relative;overflow:hidden}
.hl::before{content:'';position:absolute;top:0;right:0;width:100px;height:100px;border-radius:50%;filter:blur(40px);opacity:.08;pointer-events:none}
.hl:nth-child(1)::before{background:var(--ac)}.hl:nth-child(2)::before{background:var(--g)}.hl:nth-child(3)::before{background:var(--y)}.hl:nth-child(4)::before{background:var(--p)}
.hl .hl-t{font-size:10.5px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.hl .hl-v{font-size:28px;font-weight:800;margin:8px 0 4px;letter-spacing:-.02em}.hl .hl-d{font-size:12px;color:var(--tm);line-height:1.5}
.fav-prompt{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:28px;margin-top:18px;border-left:3px solid var(--ac)}
.fp-label{font-size:10.5px;color:var(--ac);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:12px}
.fp-text{font-size:14px;line-height:1.8;color:var(--t2);font-family:"SF Mono","Fira Code","JetBrains Mono",monospace;white-space:pre-wrap;word-break:break-word}

/* CTA */
.cta{text-align:center;padding:48px 32px;background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(52,211,153,.04));border:1px solid var(--bd);border-radius:18px;margin-top:8px}
.cta h3{font-size:24px;font-weight:800;margin-bottom:8px}.cta p{font-size:14px;color:var(--tm);margin-bottom:20px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.6}
.cta code{display:inline-block;padding:10px 24px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;font-family:"SF Mono","Fira Code",monospace;font-size:13px;color:var(--ac);user-select:all;cursor:pointer}
.cta .cta-sub{font-size:11px;color:var(--tm);margin-top:12px}

.footer{text-align:center;padding:48px 0 40px;font-size:12px;color:var(--tm)}

@media(max-width:640px){
  .hero h1{font-size:36px}.stats-row{gap:24px}.stat .num{font-size:32px}
  .pgrid{grid-template-columns:1fr}.traits{grid-template-columns:repeat(2,1fr)}
  .hl-grid{grid-template-columns:1fr}.cmp-grid{grid-template-columns:1fr}
  .period-grid{grid-template-columns:repeat(2,1fr)}.c{padding:0 16px}section{padding:40px 0}
  .radar-label{width:100px;font-size:11px}
}
</style>
</head>
